<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Jarvis Chat</title>
  <style>
    :root{--bg:#0b1020;--panel:#121a33;--panel2:#0f1730;--txt:#e8ecff;--muted:#9aa7d6;--acc:#6c7dff;--acc2:#31d0aa;--danger:#ff5f6d}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,var(--bg),#070b16);color:var(--txt)}
    .wrap{max-width:920px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 2px 16px}
    h1{font-size:22px;margin:0} .sub{color:var(--muted);font-size:13px}
    .card{background:rgba(18,26,51,.86);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    #chat{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:55vh}
    .msg{padding:12px 14px;border-radius:16px;max-width:85%;white-space:pre-wrap;line-height:1.4}
    .me{align-self:flex-end;background:linear-gradient(135deg,#2d3cff,#6c7dff)}
    .bot{align-self:flex-start;background:rgba(255,255,255,.06)}
    .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .bar{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;padding:12px;margin-top:14px;align-items:center}
    input{width:100%;border:none;outline:none;background:var(--panel2);color:var(--txt);padding:14px 16px;border-radius:14px;font-size:16px}
    button{border:none;border-radius:14px;padding:14px 16px;font-weight:700;cursor:pointer;color:white}
    .send{background:linear-gradient(135deg,var(--acc),#8b5cf6)}
    .mic{background:linear-gradient(135deg,var(--acc2),#14b8a6)}
    .mic.active{box-shadow:0 0 0 3px rgba(49,208,170,.55);animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{50%{box-shadow:0 0 0 6px rgba(49,208,170,.25)}}
    .stop{background:linear-gradient(135deg,var(--danger),#f97316)}
    .small{font-size:12px;color:var(--muted);padding:0 16px 14px}
    .settings{padding:12px 16px 4px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .settings label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted)}
    .settings select,.settings input[type=number]{background:var(--panel2);color:var(--txt);border:none;border-radius:10px;padding:10px 12px;font-size:14px}
    .settings .full{grid-column:1/-1}
    audio{width:100%}
    @media (max-width:640px){.bar{grid-template-columns:1fr auto auto}.small{padding-bottom:10px}.msg{max-width:92%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Jarvis Chat</h1>
        <div class="sub">Discussion = micro serveur (plus stable que Chrome)</div>
      </div>
      <div class="sub" id="status">Prêt</div>
    </div>

    <div class="card" id="chat"></div>

    <div class="card" style="margin-top:14px;">
      <div class="bar">
        <input id="text" placeholder="Texte ou micro pour parler..." autocomplete="off" />
        <button class="mic" id="micBtn">🎤</button>
        <button class="send" id="sendBtn">Envoyer</button>
        <button class="stop" id="stopBtn" style="display:none;">⏹</button>
      </div>
      <div class="settings">
        <label>Modele Ollama
          <select id="modelSelect"><option value="">Chargement...</option></select>
        </label>
        <label>Max tokens (reponse)
          <select id="maxTokensSelect">
            <option value="128">128</option>
            <option value="256" selected>256</option>
            <option value="512">512</option>
            <option value="1024">1024</option>
            <option value="2048">2048</option>
            <option value="4096">4096</option>
            <option value="8192">8192</option>
          </select>
        </label>
        <label>Contexte (num_ctx)
          <select id="numCtxSelect">
            <option value="1536" selected>1536</option>
            <option value="2048">2048</option>
            <option value="4096">4096</option>
            <option value="8192">8192</option>
            <option value="16384">16384</option>
            <option value="32768">32768</option>
          </select>
        </label>
        <label class="full" style="flex-direction:row;align-items:center;gap:8px;flex-wrap:wrap;">
          <button id="saveSettingsBtn" class="send" style="padding:10px 14px;">Sauver reglages</button>
          <button type="button" id="fastModeBtn" class="mic" style="padding:10px 14px;">Mode rapide</button>
          <label style="flex-direction:row;align-items:center;gap:6px;color:var(--txt);">
            <input type="checkbox" id="speakCheck" checked /> Voix
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;color:var(--txt);">
            <input type="checkbox" id="convCheck" checked /> Discussion
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;color:var(--txt);" title="Chrome plante souvent en mode continu">
            <input type="checkbox" id="serverMicCheck" checked /> Micro serveur
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;color:var(--txt);" title="DuckDuckGo pour actus, meteo, prix...">
            <input type="checkbox" id="webSearchCheck" checked /> Recherche web
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;color:var(--txt);" title="1-2 phrases + voix courte">
            <input type="checkbox" id="briefCheck" /> Reponses courtes
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;color:var(--txt);" title="Texte qui s'affiche au fil de la generation">
            <input type="checkbox" id="streamCheck" checked /> Reponse progressive
          </label>
          <span id="settingsHint"></span>
        </label>
      </div>
      <div class="small">API: <span id="apiLabel">http://127.0.0.1:8000</span> · <a href="/status/ui" style="color:var(--ok)">Statut</a></div>
      <div class="small">Astuce: remplace 127.0.0.1 par l'IP de ton PC si tu ouvres le HTML depuis le Redmi.</div>
      <div class="small" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input id="apiInput" placeholder="http://192.168.x.x:8000" style="flex:1;min-width:220px;padding:10px 12px;border-radius:10px;font-size:14px;" />
        <button id="saveApiBtn" class="send" style="padding:10px 12px;">Sauver API</button>
      </div>
      <div class="small" id="audioBox" style="display:none;padding-bottom:16px;"><audio id="audio" controls autoplay></audio></div>
    </div>
  </div>

<script>
const DEFAULT_API = (window.location.protocol === 'file:')
  ? 'http://127.0.0.1:8000'
  : window.location.origin;
const stored = localStorage.getItem('jarvis_api') || DEFAULT_API;
document.getElementById('apiLabel').textContent = stored;
document.getElementById('apiInput').value = stored;
let API = stored;
const chat = document.getElementById('chat');
const text = document.getElementById('text');
const statusEl = document.getElementById('status');
const audio = document.getElementById('audio');
const audioBox = document.getElementById('audioBox');
const micBtn = document.getElementById('micBtn');
const sendBtn = document.getElementById('sendBtn');
const stopBtn = document.getElementById('stopBtn');
const saveApiBtn = document.getElementById('saveApiBtn');
const modelSelect = document.getElementById('modelSelect');
const maxTokensSelect = document.getElementById('maxTokensSelect');
const numCtxSelect = document.getElementById('numCtxSelect');
const saveSettingsBtn = document.getElementById('saveSettingsBtn');
const fastModeBtn = document.getElementById('fastModeBtn');
const speakCheck = document.getElementById('speakCheck');
const convCheck = document.getElementById('convCheck');
const serverMicCheck = document.getElementById('serverMicCheck');
const webSearchCheck = document.getElementById('webSearchCheck');
const briefCheck = document.getElementById('briefCheck');
const streamCheck = document.getElementById('streamCheck');
const settingsHint = document.getElementById('settingsHint');
let fastModelName = 'qwen2.5:1.5b-instruct-q4_K_M';
let defaultModelName = 'qwen2.5:1.5b-instruct-q4_K_M';
const BLOCKED_MODEL_HINTS = ['gemma', 'mistral', 'qwen3.5:9b', 'qwen3.5:27b'];
let recognition = null;
let listening = false;

function isBlockedModel(name){
  const low = (name || '').toLowerCase();
  return BLOCKED_MODEL_HINTS.some(b => low.includes(b));
}

function getChatSettings(){
  const m = modelSelect.value;
  return {
    model: (!m || m === 'auto') ? '' : m,
    max_tokens: maxTokensSelect.value,
    num_ctx: numCtxSelect.value,
  };
}

function applyStoredSettings(){
  const m = localStorage.getItem('jarvis_model');
  const t = localStorage.getItem('jarvis_max_tokens');
  const c = localStorage.getItem('jarvis_num_ctx');
  if(t) maxTokensSelect.value = t;
  if(c) numCtxSelect.value = c;
  if(m === 'auto' || !m){
    modelSelect.value = 'auto';
    return;
  }
  if(isBlockedModel(m)){
    localStorage.removeItem('jarvis_model');
    modelSelect.value = 'auto';
    return;
  }
  if(m && [...modelSelect.options].some(o => o.value === m)) modelSelect.value = m;
}

function saveSettings(){
  localStorage.setItem('jarvis_model', modelSelect.value);
  localStorage.setItem('jarvis_max_tokens', maxTokensSelect.value);
  localStorage.setItem('jarvis_num_ctx', numCtxSelect.value);
  const opt = modelSelect.selectedOptions[0];
  settingsHint.textContent = opt ? `${opt.textContent} · ${maxTokensSelect.value} tokens` : 'Reglages sauves';
  setStatus('Reglages sauves');
}

const audioJobQueue = [];
let audioPlaying = false;
let drainRunning = false;
let convGeneration = 0;
let audioUnlocked = false;

async function unlockAudioPlayback(){
  if(audioUnlocked) return;
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx){
      const ctx = new Ctx();
      if(ctx.state === 'suspended') await ctx.resume();
      await ctx.close();
    }
    const prev = audio.muted;
    audio.muted = true;
    audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
    await audio.play();
    audio.pause();
    audio.removeAttribute('src');
    audio.load();
    audio.muted = prev;
    audioUnlocked = true;
  }catch(e){
    console.warn('unlockAudio', e);
  }
}

document.addEventListener('click', () => unlockAudioPlayback(), { once: true, capture: true });

async function waitForAudioJobPaths(jobId){
  for(let i = 0; i < 480; i++){
    const r = await fetch(`${API}/tts/job/${jobId}`);
    if(r.status === 200){
      const d = await r.json();
      if(d.status === 'ready'){
        if(d.audio_paths && d.audio_paths.length) return d.audio_paths;
        if(d.audio_path || d.audio_url) return [d.audio_path || d.audio_url];
      }
    }
    if(r.status === 404 || r.status >= 500) return [];
    await new Promise(res => setTimeout(res, 250));
  }
  return [];
}

async function playAudioJobProgressive(jobId, partsTotalHint){
  const played = new Set();
  const totalHint = partsTotalHint || 0;
  for(let i = 0; i < 480; i++){
    const r = await fetch(`${API}/tts/job/${jobId}`);
    if(r.status === 404 || r.status >= 500) return;
    if(r.status === 200 || r.status === 202){
      const d = await r.json();
      const paths = (d.audio_paths || []).filter(Boolean);
      const total = d.parts_total || totalHint || paths.length || 1;
      for(const src of paths){
        if(played.has(src)) continue;
        played.add(src);
        if(total > 1){
          setStatus(`Jarvis parle (${played.size}/${total})...`);
        }else{
          setStatus('Jarvis parle...');
        }
        await playAudioOnce(src);
      }
      if(d.status === 'ready') return;
    }
    await new Promise(res => setTimeout(res, 180));
  }
}

function playAudioOnce(src){
  return new Promise(async resolve => {
    const full = audioFullUrl(src);
    if(!full){ resolve(); return; }
    audioBox.style.display = 'block';
    audio.controls = true;
    const done = () => {
      audio.onended = null;
      audio.onerror = null;
      resolve();
    };
    audio.onended = done;
    audio.onerror = done;
    audio.pause();
    audio.src = full + (full.includes('?') ? '&' : '?') + 't=' + Date.now();
    audio.load();
    try{
      await audio.play();
    }catch(e){
      console.warn('audio.play', e);
      setStatus('Clique sur ▶ pour entendre Jarvis');
      const onPlay = () => {
        audio.removeEventListener('playing', onPlay);
        audio.onended = done;
      };
      audio.addEventListener('playing', onPlay);
      return;
    }
  });
}

async function playAudioPaths(paths, labelPrefix){
  const list = (paths || []).filter(Boolean);
  if(!list.length) return;
  const total = list.length;
  for(let i = 0; i < list.length; i++){
    if(total > 1){
      setStatus(`${labelPrefix || 'Jarvis parle'} (${i + 1}/${total})...`);
    }else{
      setStatus(labelPrefix || 'Jarvis parle...');
    }
    await playAudioOnce(list[i]);
  }
}

async function drainAudioQueue(){
  if(drainRunning || !audioJobQueue.length) return;
  drainRunning = true;
  audioPlaying = true;
  setStatus('Jarvis parle...');
  try{
    while(audioJobQueue.length){
      const jobId = audioJobQueue.shift();
      await playAudioJobProgressive(jobId, 0);
    }
  }finally{
    audioPlaying = false;
    drainRunning = false;
    if(audioJobQueue.length) drainAudioQueue();
    else if(convActive) setStatus('A toi...');
    else setStatus('Pret');
  }
}

function queueAudioJob(jobId){
  if(!jobId) return;
  audioJobQueue.push(jobId);
  drainAudioQueue();
}

async function loadModels(){
  try{
    const [r, s] = await Promise.all([
      fetch(`${API}/models`),
      fetch(`${API}/settings`).catch(() => null),
    ]);
    if(s && s.ok){
      const cfg = await s.json();
      if(cfg.fast_model) fastModelName = cfg.fast_model;
      if(cfg.default_model) defaultModelName = cfg.default_model;
      if(!localStorage.getItem('jarvis_max_tokens') && cfg.default_max_tokens){
        maxTokensSelect.value = String(cfg.default_max_tokens);
      }
      if(!localStorage.getItem('jarvis_num_ctx') && cfg.default_num_ctx){
        numCtxSelect.value = String(cfg.default_num_ctx);
      }
      if(cfg.web_search_enabled === false){
        webSearchCheck.checked = false;
        webSearchCheck.disabled = true;
      }
    }
    const data = await r.json();
    const models = data.models || [];
    let saved = localStorage.getItem('jarvis_model');
    if(saved && isBlockedModel(saved)){
      localStorage.removeItem('jarvis_model');
      saved = null;
    }
    saved = saved || 'auto';
    modelSelect.innerHTML = '';
    const autoOpt = document.createElement('option');
    autoOpt.value = 'auto';
    autoOpt.textContent = `Auto (${data.default_model || defaultModelName})`;
    modelSelect.appendChild(autoOpt);
    for(const m of models){
      const o = document.createElement('option');
      o.value = m.name;
      const ps = m.parameter_size ? ` · ${m.parameter_size}` : '';
      o.textContent = `${m.name} (${m.size_label}${ps})`;
      modelSelect.appendChild(o);
    }
    if(saved && [...modelSelect.options].some(o => o.value === saved)){
      modelSelect.value = saved;
    } else {
      modelSelect.value = 'auto';
    }
    applyStoredSettings();
    const opt = modelSelect.selectedOptions[0];
    if(opt) settingsHint.textContent = `${opt.textContent} · ${maxTokensSelect.value} tokens`;
  }catch(e){
    modelSelect.innerHTML = `<option value="${savedModelFallback()}">${savedModelFallback()}</option>`;
    applyStoredSettings();
  }
}

function savedModelFallback(){
  const m = localStorage.getItem('jarvis_model');
  if(m && !isBlockedModel(m) && m !== 'auto') return m;
  return defaultModelName;
}

function addMsg(txt, cls){const d=document.createElement('div');d.className='msg '+cls;d.textContent=txt;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d}
function setStatus(s){statusEl.textContent=s}
function audioFullUrl(url){
  if(!url) return '';
  if(url.startsWith('http://') || url.startsWith('https://')) return url;
  return `${API}${url.startsWith('/') ? '' : '/'}${url}`;
}
function speakUrl(url){
  const full = audioFullUrl(url);
  if(!full) return;
  audio.src = full;
  audioBox.style.display = 'block';
  audio.play().catch(()=>{ setStatus('Clique sur lecture audio'); });
}

addMsg('Bonjour, je suis Jarvis. Pose-moi une question.', 'bot');

saveApiBtn.onclick = ()=>{
  const v = document.getElementById('apiInput').value.trim().replace(/\/$/, '');
  if(!v) return;
  localStorage.setItem('jarvis_api', v);
  API = v;
  document.getElementById('apiLabel').textContent = v;
  setStatus('API sauvegardee');
  loadModels();
};

saveSettingsBtn.onclick = saveSettings;

fastModeBtn.onclick = ()=>{
  if([...modelSelect.options].some(o => o.value === fastModelName)){
    modelSelect.value = fastModelName;
  }
  maxTokensSelect.value = '256';
  numCtxSelect.value = '2048';
  saveSettings();
  setStatus('Mode rapide active');
};

if(localStorage.getItem('jarvis_speak') === '0') speakCheck.checked = false;
else speakCheck.checked = true;
speakCheck.onchange = ()=> localStorage.setItem('jarvis_speak', speakCheck.checked ? '1' : '0');
if(localStorage.getItem('jarvis_conv') === '0') convCheck.checked = false;
convCheck.onchange = ()=>{
  localStorage.setItem('jarvis_conv', convCheck.checked ? '1' : '0');
  if(!convCheck.checked && convActive) stopConversation();
};
if(localStorage.getItem('jarvis_server_mic') === '0') serverMicCheck.checked = false;
else serverMicCheck.checked = true;
serverMicCheck.onchange = ()=>{
  localStorage.setItem('jarvis_server_mic', serverMicCheck.checked ? '1' : '0');
};
if(localStorage.getItem('jarvis_web') === '0') webSearchCheck.checked = false;
else webSearchCheck.checked = true;
webSearchCheck.onchange = ()=>{
  localStorage.setItem('jarvis_web', webSearchCheck.checked ? '1' : '0');
};
if(localStorage.getItem('jarvis_brief') === '1') briefCheck.checked = true;
briefCheck.onchange = ()=>{
  localStorage.setItem('jarvis_brief', briefCheck.checked ? '1' : '0');
};
if(localStorage.getItem('jarvis_stream') === '0') streamCheck.checked = false;
streamCheck.onchange = ()=>{
  localStorage.setItem('jarvis_stream', streamCheck.checked ? '1' : '0');
};

function isChromeBrowser(){
  const ua = navigator.userAgent || '';
  return /Chrome\//i.test(ua) && !/Edg\//i.test(ua) && !/OPR\//i.test(ua);
}

function useServerMic(){
  if(serverMicCheck.checked) return true;
  if(convActive || convCheck.checked) return true;
  return isChromeBrowser();
}

let chatBusy = false;
let lastSentText = '';
let lastSentAt = 0;
let convActive = false;
let silenceTimer = null;
let maxListenTimer = null;
const SILENCE_MS = 1500;
const MAX_LISTEN_MS = 14000;

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function waitForPlaybackIdle(includeChatBusy = false){
  return new Promise(resolve => {
    const tick = () => {
      const chatOk = includeChatBusy ? !chatBusy : true;
      if(chatOk && !audioPlaying && !drainRunning && !audioJobQueue.length){
        resolve();
        return;
      }
      setTimeout(tick, 120);
    };
    tick();
  });
}

function clearSilenceTimer(){
  if(silenceTimer){ clearTimeout(silenceTimer); silenceTimer = null; }
}
function clearMaxListenTimer(){
  if(maxListenTimer){ clearTimeout(maxListenTimer); maxListenTimer = null; }
}

function haltListening(){
  clearSilenceTimer();
  clearMaxListenTimer();
  if(mediaRecorder && mediaRecorder.state === 'recording'){
    stopRecording();
  }else if(recognition && listening){
    try{ recognition.stop(); }catch(_){}
  }
}

function scheduleAutoSend(){
  clearSilenceTimer();
  silenceTimer = setTimeout(() => finishPhraseAndSend(), SILENCE_MS);
}

function responseAudioPaths(data){
  if(data.audio_paths && data.audio_paths.length) return data.audio_paths;
  if(data.audio_path) return [data.audio_path];
  if(data.audio_url) return [data.audio_url];
  return [];
}

async function playResponseAudio(data){
  if(!speakCheck.checked) return;
  const paths = responseAudioPaths(data);
  if(paths.length){
    while(audioPlaying) await sleep(150);
    audioPlaying = true;
    try{
      await playAudioPaths(paths, 'Jarvis parle');
    }finally{
      audioPlaying = false;
      if(audioJobQueue.length) drainAudioQueue();
    }
    return;
  }
  if(data.audio_job_id){
    const parts = data.audio_parts_total || 0;
    if(parts > 1){
      setStatus(`Voix (${parts} parties, lecture au fil)...`);
    }
    while(audioPlaying) await sleep(150);
    audioPlaying = true;
    try{
      await playAudioJobProgressive(data.audio_job_id, parts);
    }finally{
      audioPlaying = false;
      if(audioJobQueue.length) drainAudioQueue();
    }
    return;
  }
  if(data.audio_error) setStatus('Voix echouee — regarde la console serveur');
}

async function resumeConversationListen(){
  if(!convActive || !convCheck.checked) return;
  const gen = convGeneration;
  await waitForPlaybackIdle(true);
  for(let i = 0; i < 60; i++){
    if(gen !== convGeneration || !convActive) return;
    if(!chatBusy && !audioPlaying && !drainRunning && !audioJobQueue.length){
      await sleep(500);
      if(gen !== convGeneration || !convActive) return;
      voiceSent = false;
      try{
        await beginListenTurn();
      }catch(e){
        console.warn('beginListenTurn', e);
        await sleep(600);
        continue;
      }
      return;
    }
    await sleep(200);
  }
  setStatus('Micro en pause — re-clic 💬');
}

function buildChatQuery(clean, s){
  const qs = new URLSearchParams({
    message: clean,
    user_id: 'default',
    max_tokens: s.max_tokens,
    num_ctx: s.num_ctx,
    speak: speakCheck.checked ? 'true' : 'false',
    fast: 'false',
  });
  if(s.model) qs.set('model', s.model);
  if(!webSearchCheck.checked) qs.set('web', 'false');
  /* web=true : uniquement via heuristique serveur (needs_web_search), pas sur la longueur */
  if(briefCheck.checked) qs.set('brief', 'true');
  return qs;
}

function appendWebSources(data){
  if(!data.web_used || !data.web_sources?.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg bot web-sources';
  wrap.style.fontSize = '12px';
  wrap.style.opacity = '0.85';
  wrap.style.marginTop = '4px';
  wrap.textContent = data.web_sources.slice(0, 4).map((s, i) =>
    `${i + 1}. ${s.title || s.url || 'source'}`
  ).join(' · ');
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function applyRouteStatus(data){
  if(data.route){
    const prov = data.provider === 'groq' ? 'Groq' : 'local';
    setStatus(`${prov} · ${data.route}${data.complexity_score != null ? ' (score '+data.complexity_score+')' : ''}`);
  } else if(data.web_used && data.web_sources?.length){
    setStatus(`${data.web_sources.length} source(s) web`);
  }
}

async function consumeChatStream(qs){
  const botEl = addMsg('', 'bot');
  let full = '';
  const r = await fetch(`${API}/chat/stream?${qs}`, { method: 'POST' });
  if(!r.ok || !r.body) throw new Error('stream ' + r.status);
  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  let data = {};
  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    buf += dec.decode(value, {stream: true});
    const parts = buf.split('\n\n');
    buf = parts.pop() || '';
    for(const block of parts){
      const line = block.split('\n').find(l => l.startsWith('data:'));
      if(!line) continue;
      const raw = line.replace(/^data:\s*/, '').trim();
      if(!raw) continue;
      let ev;
      try{ ev = JSON.parse(raw); }catch(_){ continue; }
      if(ev.error) throw new Error(ev.error);
      if(ev.token){
        full += ev.token;
        botEl.textContent = full;
        chat.scrollTop = chat.scrollHeight;
      }
      if(ev.replace != null){
        full = ev.replace;
        botEl.textContent = full;
        chat.scrollTop = chat.scrollHeight;
      }
      if(ev.done){
        if(ev.response) full = ev.response;
        botEl.textContent = full || botEl.textContent;
        data = {...ev, response: full};
      }
    }
  }
  if(!full && !data.response) throw new Error('reponse vide');
  return data;
}

async function sendMessage(msg, opts = {}){
  const clean = (msg || '').trim();
  if(!clean || chatBusy) return;
  const now = Date.now();
  if(!opts.fromConv && clean === lastSentText && now - lastSentAt < 3000) return;

  if(speakCheck.checked) await unlockAudioPlayback();

  haltListening();
  chatBusy = true;
  lastSentText = clean;
  lastSentAt = now;
  addMsg(clean,'me');
  text.value='';
  setStatus(webSearchCheck.checked ? 'Jarvis reflechit (web si besoin)...' : 'Jarvis reflechit...');
  try{
    const s = getChatSettings();
    const qs = buildChatQuery(clean, s);
    let data;
    if(streamCheck.checked){
      try{
        data = await consumeChatStream(qs);
      }catch(streamErr){
        console.warn('stream fallback /chat', streamErr);
        const r = await fetch(`${API}/chat?${qs}`, { method: 'POST' });
        data = await r.json();
        addMsg(data.response || data.output || data.error || '', 'bot');
      }
    }else{
      const r = await fetch(`${API}/chat?${qs}`, { method: 'POST' });
      data = await r.json();
      addMsg(data.response || data.output || data.error || JSON.stringify(data), 'bot');
    }
    appendWebSources(data);
    applyRouteStatus(data);
    await playResponseAudio(data);
  }catch(e){
    addMsg('Erreur de connexion au backend.', 'bot');
    setStatus('Erreur');
  }finally{
    chatBusy = false;
    voiceSent = false;
  }
  if(convActive){
    setStatus('A toi...');
    resumeConversationListen();
  }else if(!audioPlaying && !audioJobQueue.length){
    setStatus('Pret');
  }
}

sendBtn.onclick = ()=>sendMessage(text.value);
text.addEventListener('keydown', e=>{ if(e.key==='Enter') sendMessage(text.value); });

const MIC_ERRORS = {
  'not-allowed': 'Micro bloque — clic cadenas dans la barre d\'adresse → Autoriser',
  'no-speech': 'Aucune voix detectee — parle plus fort ou plus pres',
  'network': 'Micro Chrome : connexion Internet requise',
  'aborted': 'Ecoute annulee',
  'audio-capture': 'Aucun micro detecte sur le PC',
  'service-not-allowed': 'Micro refuse (utilise http://127.0.0.1:8000 sur ce PC)',
};

function micHostOk(){
  const h = location.hostname;
  return location.protocol === 'https:' || h === 'localhost' || h === '127.0.0.1';
}

async function ensureMicPermission(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    throw new Error('Navigateur sans acces micro');
  }
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  stream.getTracks().forEach(t => t.stop());
}

let mediaRecorder = null;
let recordChunks = [];
let vadCtx = null;
let vadStream = null;
let vadInterval = null;
let sharedMicStream = null;

async function getVadAudioContext(){
  if(!vadCtx || vadCtx.state === 'closed'){
    vadCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(vadCtx.state === 'suspended'){
    try{ await vadCtx.resume(); }catch(_){}
  }
  return vadCtx;
}

function releaseSharedMic(){
  if(sharedMicStream){
    sharedMicStream.getTracks().forEach(t => t.stop());
    sharedMicStream = null;
  }
  if(vadCtx){
    try{ vadCtx.close(); }catch(_){}
    vadCtx = null;
  }
}

async function getSharedMicStream(){
  if(sharedMicStream && sharedMicStream.active){
    const live = sharedMicStream.getTracks().some(t => t.readyState === 'live');
    if(live) return sharedMicStream;
  }
  sharedMicStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true },
  });
  return sharedMicStream;
}

function finishPhraseAndSend(){
  if(voiceSent || chatBusy) return;
  const toSend = (voiceAccum || text.value).trim();
  if(!toSend || toSend.length < 2){
    if(convActive && !chatBusy) resumeConversationListen();
    return;
  }
  voiceSent = true;
  voiceAccum = '';
  text.value = '';
  clearSilenceTimer();
  if(recognition && listening){
    try{ recognition.stop(); }catch(_){}
  }else if(mediaRecorder && mediaRecorder.state === 'recording'){
    stopRecording();
    return;
  }
  sendMessage(toSend, { fromConv: true });
}

function startConversation(){
  if(!micHostOk()){
    addMsg('Micro : ouvre http://127.0.0.1:8000 sur ce PC (Chrome).', 'bot');
    return;
  }
  convGeneration++;
  convActive = true;
  micBtn.classList.add('active');
  micBtn.textContent = '💬';
  stopBtn.style.display = 'none';
  setStatus('Discussion — parle naturellement');
  beginListenTurn();
}

function stopConversation(){
  convGeneration++;
  convActive = false;
  voiceSent = false;
  haltListening();
  releaseSharedMic();
  micBtn.classList.remove('active');
  micBtn.textContent = '🎤';
  setStatus('Discussion terminee');
}

async function recordAndSend(){
  if(!micHostOk()){
    addMsg('Depuis le telephone : le micro exige HTTPS. Sur PC ouvre http://127.0.0.1:8000', 'bot');
    setStatus('Micro : HTTPS requis');
    return;
  }
  try{
    await ensureMicPermission();
  }catch(e){
    setStatus('Autorise le micro (Windows + Chrome)');
    return;
  }
  const stream = convActive ? await getSharedMicStream() : await navigator.mediaDevices.getUserMedia({ audio: true });
  const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus' : 'audio/webm';
  recordChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
  mediaRecorder.ondataavailable = e => { if(e.data.size) recordChunks.push(e.data); };
  mediaRecorder.onstop = async ()=>{
    if(vadInterval){ clearInterval(vadInterval); vadInterval = null; }
    if(!convActive){
      if(vadCtx){ try{ vadCtx.close(); }catch(_){} vadCtx = null; }
      stream.getTracks().forEach(t => t.stop());
    }
    else if(stream !== sharedMicStream) stream.getTracks().forEach(t => t.stop());
    vadStream = null;
    mediaRecorder = null;
    listening = false;
    if(!convActive) micBtn.textContent = '🎤';
    if(!convActive) stopBtn.style.display = 'none';
    const blob = new Blob(recordChunks, { type: mime });
    if(blob.size < 500){
      setStatus('Pas assez entendu');
      if(convActive) resumeConversationListen();
      return;
    }
    if(chatBusy) return;
    if(voiceSent) return;
    voiceSent = true;
    setStatus('Transcription...');
    try{
      const fd = new FormData();
      fd.append('audio', blob, 'voice.webm');
      const r = await fetch(`${API}/stt`, { method: 'POST', body: fd });
      const data = await r.json().catch(() => ({}));
      if(data.text && data.text.trim()){
        await sendMessage(data.text.trim(), { fromConv: true });
      }else{
        const msg = data.error || data.hint || (r.ok ? 'Pas compris' : 'STT erreur ' + r.status);
        setStatus(msg);
        if(!r.ok || data.hint) addMsg('STT : ' + msg + (data.hint ? ' — ' + data.hint : ''), 'bot');
        voiceSent = false;
        if(convActive) resumeConversationListen();
      }
    }catch(e){
      setStatus('STT indisponible');
      voiceSent = false;
      if(convActive) resumeConversationListen();
    }finally{
      if(!chatBusy) voiceSent = false;
    }
  };
  vadStream = stream;
  const actx = await getVadAudioContext();
  const src = actx.createMediaStreamSource(stream);
  const analyser = actx.createAnalyser();
  analyser.fftSize = 512;
  src.connect(analyser);
  let silentMs = 0;
  let heard = false;
  mediaRecorder.start(200);
  listening = true;
  if(convActive) micBtn.textContent = '💬';
  else micBtn.textContent = '🎙️';
  setStatus(useServerMic() ? 'Parle (micro serveur)...' : 'Parle...');
  maxListenTimer = setTimeout(() => {
    if(mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  }, MAX_LISTEN_MS);
  vadInterval = setInterval(() => {
    if(!mediaRecorder || mediaRecorder.state !== 'recording') return;
    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buf);
    let sum = 0;
    for(let i = 0; i < buf.length; i++) sum += buf[i];
    const level = sum / buf.length;
    if(level > 12){
      heard = true;
      silentMs = 0;
    }else if(heard){
      silentMs += 100;
      if(silentMs >= SILENCE_MS) stopRecording();
    }
  }, 100);
}

function stopRecording(){
  if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
}

let voiceAccum = '';
let voiceSent = false;

function updateVoicePreview(results){
  let finals = '';
  let interim = '';
  for(let i = 0; i < results.length; i++){
    const p = results[i][0].transcript;
    if(results[i].isFinal) finals += p;
    else interim = p;
  }
  voiceAccum = finals.trim();
  text.value = (voiceAccum + (interim ? ' ' + interim : '')).trim();
}

function bindRecognitionEvents(rec){
  rec.onstart = ()=>{
    listening = true;
    voiceAccum = '';
    voiceSent = false;
    if(convActive) micBtn.textContent = '💬';
    else micBtn.textContent = '🎙️';
    setStatus('Je t ecoute...');
    if(!convActive) stopBtn.style.display = 'inline-block';
    clearMaxListenTimer();
    maxListenTimer = setTimeout(() => {
      if(listening) finishPhraseAndSend();
    }, MAX_LISTEN_MS);
  };
  rec.onend = ()=>{
    listening = false;
    clearMaxListenTimer();
    clearSilenceTimer();
    if(!convActive){
      micBtn.textContent = '🎤';
      stopBtn.style.display = 'none';
    }
    if(voiceSent) return;
    const toSend = (voiceAccum || text.value).trim();
    voiceAccum = '';
    text.value = '';
    if(toSend.length >= 2){
      voiceSent = true;
      sendMessage(toSend, { fromConv: true });
    }else if(convActive && !chatBusy){
      resumeConversationListen();
    }else if(!convActive){
      setStatus('Pret');
    }
  };
  rec.onresult = (e)=>{
    updateVoicePreview(e.results);
    let finals = '';
    for(let i = 0; i < e.results.length; i++){
      if(e.results[i].isFinal) finals += e.results[i][0].transcript;
    }
    if(finals.trim()) voiceAccum = finals.trim();
    scheduleAutoSend();
  };
  rec.onspeechend = ()=> scheduleAutoSend();
  rec.onerror = (e)=>{
    listening = false;
    clearMaxListenTimer();
    if(e.error === 'no-speech'){
      if(convActive && !chatBusy) resumeConversationListen();
      else if(!convActive) setStatus('Parle plus fort');
      return;
    }
    if(e.error === 'aborted') return;
    if(!convActive) micBtn.textContent = '🎤';
    stopBtn.style.display = 'none';
    setStatus(MIC_ERRORS[e.error] || ('Erreur micro : ' + e.error));
    if(convActive && !chatBusy) resumeConversationListen();
  };
}

function freshRecognition(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return null;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'fr-FR';
  rec.interimResults = true;
  rec.continuous = false;
  rec.maxAlternatives = 1;
  bindRecognitionEvents(rec);
  return rec;
}

async function beginListenTurn(){
  if(listening) return;
  if(chatBusy || audioPlaying || drainRunning){
    setTimeout(() => resumeConversationListen(), 300);
    return;
  }
  if(!micHostOk()){
    setStatus('Utilise 127.0.0.1 sur PC');
    return;
  }
  voiceSent = false;
  voiceAccum = '';
  text.value = '';

  if(useServerMic()){
    await recordAndSend();
    return;
  }

  if(recognitionSupported){
    try{ await ensureMicPermission(); }catch(e){
      setStatus('Autorise le micro pour ce site');
      return;
    }
    try{
      if(recognition){
        recognition.onstart = null;
        recognition.onend = null;
        recognition.onresult = null;
        recognition.onerror = null;
        try{ recognition.abort(); }catch(_){}
        try{ recognition.stop(); }catch(_){}
      }
    }catch(_){}
    await sleep(350);
    recognition = freshRecognition();
    if(!recognition) return;
    for(let attempt = 0; attempt < 4; attempt++){
      try{
        recognition.start();
        return;
      }catch(e){
        await sleep(400 + attempt * 200);
        recognition = freshRecognition();
      }
    }
    setStatus('Chrome bloque le micro — coche Micro serveur');
    return;
  }
  await recordAndSend();
}

async function startVoiceInput(){
  if(convActive) await beginListenTurn();
  else await beginListenTurn();
}

function stopVoiceInput(){
  if(recognition && listening) recognition.stop();
  else stopRecording();
}

const recognitionSupported = ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window);
if(isChromeBrowser() && recognitionSupported){
  addMsg('Chrome : le micro serveur est active par defaut (plus stable que la reconnaissance Chrome).', 'bot');
}

micBtn.onclick = ()=>{
  if(convCheck.checked){
    if(convActive){
      if(listening) finishPhraseAndSend();
      else if(chatBusy || audioPlaying) setStatus('Jarvis repond...');
      else beginListenTurn();
    }else{
      startConversation();
    }
    return;
  }
  if(listening) stopVoiceInput();
  else startVoiceInput();
};
stopBtn.onclick = ()=>{
  if(convActive) finishPhraseAndSend();
  else stopVoiceInput();
};

applyStoredSettings();
loadModels();
</script>
